name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（默认读取 src/VERSION）'
        required: false
        default: ''
      publish:
        description: '显式发布 GitHub Release（测试构建请保持 false）'
        required: true
        type: boolean
        default: false
      build_windows:
        description: '构建 Windows'
        required: true
        type: boolean
        default: true
      build_macos:
        description: '构建 macOS'
        required: true
        type: boolean
        default: true
      build_linux:
        description: '构建 Linux CLI'
        required: true
        type: boolean
        default: true

jobs:
  build-windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        shell: bash
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest

      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --python-flag=no_docstrings --windows-console-mode=disable --enable-plugin=pyside6 --plugin-enable=upx --upx-binary="upx" --include-data-dir=assets=assets --include-data-dir=src/i18n=src/i18n --include-data-file=src/VERSION=src/VERSION --output-dir=dist --output-filename="BuddyTool.exe" --assume-yes-for-downloads app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/BuddyTool.exe

  build-macos-intel:
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    runs-on: macos-15-intel
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MACOSX_DEPLOYMENT_TARGET: "13"
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Install Rosetta
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (x86_64 via Rosetta)
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 python -m pip install -r requirements.txt

      - name: Install UPX
        run: brew install upx

      - name: Fix OpenSSL dependency scan issue
        run: |
          # Nuitka 在 macOS Intel 上扫描 Homebrew OpenSSL 的 libcrypto.dylib 时会报 FATAL 错误
          # 解决方案：临时 unlink Homebrew openssl，让 Nuitka 使用 Python 自带的静态链接
          brew unlink openssl@3 2>/dev/null || true

      - name: Verify Python runs as x86_64
        run: |
          arch -x86_64 python -c "import platform; print(f'Python arch: {platform.machine()}')"
          file $(arch -x86_64 python -c "import sys; print(sys.executable)")

      - name: Build with Nuitka (x86_64 via Rosetta)
        run: |
          arch -x86_64 python -m nuitka --onefile --python-flag=no_docstrings --enable-plugin=pyside6 --plugin-enable=upx --upx-binary="$(brew --prefix upx)/bin/upx" --include-data-dir=assets=assets --include-data-dir=src/i18n=src/i18n --include-data-file=src/VERSION=src/VERSION --output-dir=dist --output-filename="BuddyTool" --assume-yes-for-downloads app.py

      - name: Verify app architecture
        run: |
          file "dist/BuddyTool"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build
          path: |
            dist/BuddyTool

  build-macos-arm:
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    runs-on: macos-15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MACOSX_DEPLOYMENT_TARGET: "13"
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        shell: bash
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install UPX
        run: brew install upx

      - name: Verify native ARM Python
        run: |
          test "$(python -c 'import platform; print(platform.machine())')" = "arm64"

      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --python-flag=no_docstrings --enable-plugin=pyside6 --plugin-enable=upx --upx-binary="$(brew --prefix upx)/bin/upx" --include-data-dir=assets=assets --include-data-dir=src/i18n=src/i18n --include-data-file=src/VERSION=src/VERSION --output-dir=dist --output-filename="BuddyTool" --assume-yes-for-downloads app.py

      - name: Verify ARM app architecture
        run: |
          APP_EXE="dist/BuddyTool"
          test -x "$APP_EXE"
          file "$APP_EXE" | grep -q 'arm64'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build
          path: |
            dist/BuddyTool

  build-linux-cli:
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        shell: bash
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for PySide6
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 libfontconfig1 \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxrender1 libxi6 libxtst6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install UPX
        run: sudo apt-get install -y -q upx-ucl

      - name: Build CLI with Nuitka
        run: |
          python -m nuitka --onefile --python-flag=no_docstrings --enable-plugin=pyside6 --include-package=charset_normalizer --plugin-enable=upx --upx-binary="/usr/bin/upx" --include-data-dir=assets=assets --include-data-dir=src/i18n=src/i18n --include-data-file=src/VERSION=src/VERSION --output-dir=dist --output-filename="buddy-tool" --assume-yes-for-downloads app.py

      - name: Verify build
        run: |
          test -x "dist/buddy-tool"
          file "dist/buddy-tool"
          chmod +x "dist/buddy-tool"
          ./dist/buddy-tool help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-cli-build
          path: |
            dist/buddy-tool

  release:
    # Tag push alone never publishes. Manual dispatch must explicitly set publish=true.
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.publish == true }}
    needs: [build-windows, build-macos-intel, build-macos-arm, build-linux-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          SOURCE_VERSION=$(tr -d '\r\n' < src/VERSION)
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="$SOURCE_VERSION"
          fi
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $VERSION"; exit 1; }
          [[ "$VERSION" == "$SOURCE_VERSION" ]] || { echo "Version mismatch: input=$VERSION, src/VERSION=$SOURCE_VERSION"; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Buddy Tool v${{ steps.version.outputs.version }}
          body: |
            ## Buddy Tool v${{ steps.version.outputs.version }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Windows x64 | BuddyTool.exe |
            | macOS Intel | BuddyTool-Intel |
            | macOS ARM (M1/M2/M3) | BuddyTool-ARM |
            | Linux CLI | buddy-tool |

            ### 安装

            **Windows**: 下载 `BuddyTool.exe`，双击运行

            **macOS**: 下载 `BuddyTool`，终端执行 `chmod +x BuddyTool && ./BuddyTool`

            **Linux CLI**:
            ```
            chmod +x buddy-tool
            ./buddy-tool help          # 查看帮助
            ./buddy-tool info          # 展示当前信息
            ./buddy-tool credits       # 查询积分
            ./buddy-tool redeem BC_xx  # 卡密充值
            ./buddy-tool start         # 启动服务
            ./buddy-tool config        # 展示配置
            ```

            ### 版本号
            ${{ steps.version.outputs.version }}
          files: |
            artifacts/windows-build/BuddyTool.exe
            artifacts/macos-intel-build/BuddyTool
            artifacts/macos-arm-build/BuddyTool
            artifacts/linux-cli-build/buddy-tool
          draft: false
          prerelease: false
