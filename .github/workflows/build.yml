name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（默认读取 src/VERSION）'
        required: false
        default: ''
      publish:
        description: '显式发布 GitHub Release（测试构建请保持 false）'
        required: true
        type: boolean
        default: false

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        shell: bash
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --windows-console-mode=disable --enable-plugin=pyside6 --include-package=win32com --include-package=pythoncom --include-package=pywintypes --include-data-dir=assets=assets --include-data-dir=src/i18n=src/i18n --include-data-file=src/VERSION=src/VERSION --output-dir=dist --output-filename="BuddyTool.exe" --assume-yes-for-downloads app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/BuddyTool.exe

  build-macos-intel:
    runs-on: macos-14
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Install Rosetta
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (x86_64 via Rosetta)
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 python -m pip install -r requirements.txt

      - name: Verify Python runs as x86_64
        run: |
          arch -x86_64 python -c "import platform; print(f'Python arch: {platform.machine()}')"
          file $(arch -x86_64 python -c "import sys; print(sys.executable)")

      - name: Build with Nuitka (x86_64 via Rosetta)
        run: |
          arch -x86_64 python -m nuitka --onefile --enable-plugin=pyside6 --include-data-dir=assets=assets --include-data-dir=src/i18n=src/i18n --include-data-file=src/VERSION=src/VERSION --output-dir=dist --output-filename="BuddyTool" --assume-yes-for-downloads app.py

      - name: Verify app architecture
        run: |
          file "dist/BuddyTool"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build
          path: |
            dist/BuddyTool

  build-macos-arm:
    runs-on: macos-14
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        shell: bash
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify native ARM Python
        run: |
          test "$(python -c 'import platform; print(platform.machine())')" = "arm64"

      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --enable-plugin=pyside6 --include-data-dir=assets=assets --include-data-dir=src/i18n=src/i18n --include-data-file=src/VERSION=src/VERSION --output-dir=dist --output-filename="BuddyTool" --assume-yes-for-downloads app.py

      - name: Verify ARM app architecture
        run: |
          APP_EXE="dist/BuddyTool"
          test -x "$APP_EXE"
          file "$APP_EXE" | grep -q 'arm64'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build
          path: |
            dist/BuddyTool

  release:
    # Tag push alone never publishes. Manual dispatch must explicitly set publish=true.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
    needs: [build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          SOURCE_VERSION=$(tr -d '\r\n' < src/VERSION)
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="$SOURCE_VERSION"
          fi
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $VERSION"; exit 1; }
          [[ "$VERSION" == "$SOURCE_VERSION" ]] || { echo "Version mismatch: input=$VERSION, src/VERSION=$SOURCE_VERSION"; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Buddy Tool v${{ steps.version.outputs.version }}
          body: |
            ## Buddy Tool v${{ steps.version.outputs.version }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Windows x64 | BuddyTool.exe |
            | macOS Intel | BuddyTool (Intel) |
            | macOS ARM (M1/M2/M3) | BuddyTool (ARM) |

            ### 安装

            **Windows**: 下载 `BuddyTool.exe`，双击运行

            **macOS**: 下载 `BuddyTool`，终端执行 `chmod +x BuddyTool && ./BuddyTool`

            ### 版本号
            ${{ steps.version.outputs.version }}
          files: |
            artifacts/windows-build/BuddyTool.exe
            artifacts/macos-intel-build/BuddyTool
            artifacts/macos-arm-build/BuddyTool
          draft: false
          prerelease: false
