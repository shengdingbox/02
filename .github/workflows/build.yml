name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（默认读取 src/VERSION）'
        required: false
        default: ''
      publish:
        description: '显式发布 GitHub Release（测试构建请保持 false）'
        required: true
        type: boolean
        default: false

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        shell: bash
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller antigravity.spec --noconfirm

      - name: Package as zip
        run: |
          cd "dist"
          Compress-Archive -Path "Antigravity Tools" -DestinationPath "Antigravity-Tools-Windows-x64.zip"
          # 增量包（只含 src/ 目录）
          Compress-Archive -Path "Antigravity Tools\_internal\src" -DestinationPath "Antigravity-Tools-Windows-x64-src.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/Antigravity-Tools-Windows-x64.zip
            dist/Antigravity-Tools-Windows-x64-src.zip

  build-macos-intel:
    runs-on: macos-14
    env:
      PYINSTALLER_TARGET_ARCH: x86_64
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Install Rosetta
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (x86_64 via Rosetta)
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 python -m pip install -r requirements.txt

      - name: Verify Python runs as x86_64
        run: |
          arch -x86_64 python -c "import platform; print(f'Python arch: {platform.machine()}')"
          file $(arch -x86_64 python -c "import sys; print(sys.executable)")

      - name: Build with PyInstaller (x86_64 via Rosetta)
        run: |
          arch -x86_64 python -m PyInstaller antigravity-mac.spec --noconfirm

      - name: Verify app architecture
        run: |
          file "dist/Antigravity Tools.app/Contents/MacOS/"*

      - name: Package with ditto
        run: |
          cd dist
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "Antigravity Tools.app" "Antigravity-Tools-macOS-Intel.zip"
          cd "Antigravity Tools.app/Contents/Resources"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "src" "../../../Antigravity-Tools-macOS-Intel-src.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build
          path: |
            dist/Antigravity-Tools-macOS-Intel.zip
            dist/Antigravity-Tools-macOS-Intel-src.zip

  build-macos-arm:
    runs-on: macos-14
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify clean build source
        shell: bash
        run: |
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify native ARM Python
        run: |
          test "$(python -c 'import platform; print(platform.machine())')" = "arm64"

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller antigravity-mac.spec --noconfirm

      - name: Verify ARM app architecture
        run: |
          APP_EXE="dist/Antigravity Tools.app/Contents/MacOS/Antigravity Tools"
          test -x "$APP_EXE"
          file "$APP_EXE" | grep -q 'arm64'
          lipo -archs "$APP_EXE" | tr ' ' '\n' | grep -qx 'arm64'

      - name: Package with ditto
        run: |
          cd dist
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "Antigravity Tools.app" "Antigravity-Tools-macOS-ARM.zip"
          cd "Antigravity Tools.app/Contents/Resources"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "src" "../../../Antigravity-Tools-macOS-ARM-src.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build
          path: |
            dist/Antigravity-Tools-macOS-ARM.zip
            dist/Antigravity-Tools-macOS-ARM-src.zip

  release:
    # Tag push alone never publishes. Manual dispatch must explicitly set publish=true.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
    needs: [build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          SOURCE_VERSION=$(tr -d '\r\n' < src/VERSION)
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="$SOURCE_VERSION"
          fi
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $VERSION"; exit 1; }
          [[ "$VERSION" == "$SOURCE_VERSION" ]] || { echo "Version mismatch: input=$VERSION, src/VERSION=$SOURCE_VERSION"; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Antigravity Tools v${{ steps.version.outputs.version }}
          body: |
            ## Antigravity Tools v${{ steps.version.outputs.version }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Windows x64 | Antigravity-Tools-Windows-x64.zip |
            | macOS Intel | Antigravity-Tools-macOS-Intel.zip |
            | macOS ARM (M1/M2/M3) | Antigravity-Tools-macOS-ARM.zip |

            ### 安装

            **Windows**: 下载 zip 解压，运行 `Antigravity Tools.exe`

            **macOS**: 下载 zip 解压，将 `Antigravity Tools.app` 拖到"应用程序"文件夹
            首次打开右键 → 打开（绕过 Gatekeeper）

            ### 版本号
            ${{ steps.version.outputs.version }}
          files: |
            artifacts/windows-build/Antigravity-Tools-Windows-x64.zip
            artifacts/windows-build/Antigravity-Tools-Windows-x64-src.zip
            artifacts/macos-intel-build/Antigravity-Tools-macOS-Intel.zip
            artifacts/macos-intel-build/Antigravity-Tools-macOS-Intel-src.zip
            artifacts/macos-arm-build/Antigravity-Tools-macOS-ARM.zip
            artifacts/macos-arm-build/Antigravity-Tools-macOS-ARM-src.zip
          draft: false
          prerelease: false
